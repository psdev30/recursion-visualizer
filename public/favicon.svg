<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background pill matching the app's --bg-primary -->
  <rect width="32" height="32" rx="7" fill="#1a1a2e"/>

  <!-- Edges (drawn first so nodes sit on top) -->
  <!-- Root → left child -->
  <line x1="16" y1="10" x2="9"  y2="19" stroke="#4a5270" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Root → right child -->
  <line x1="16" y1="10" x2="23" y2="19" stroke="#4a5270" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Left child → left leaf -->
  <line x1="9"  y1="22" x2="5"  y2="28" stroke="#4a5270" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Left child → right leaf -->
  <line x1="9"  y1="22" x2="13" y2="28" stroke="#4a5270" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Root node — accent blue/purple -->
  <circle cx="16" cy="7.5" r="4"   fill="#5c6bc0"/>

  <!-- Level-2 nodes — lighter blue -->
  <circle cx="9"  cy="21"  r="3.5" fill="#7fc8f8"/>
  <circle cx="23" cy="21"  r="3.5" fill="#7fc8f8"/>

  <!-- Leaf nodes — muted, showing completed state -->
  <circle cx="5"  cy="29"  r="2.5" fill="#3a4a6b"/>
  <circle cx="13" cy="29"  r="2.5" fill="#3a4a6b"/>
</svg>
